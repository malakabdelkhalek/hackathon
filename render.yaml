services:
  - type: web
    name: sentinel-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python rag/setup.py
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        value: sentinel_secret_jwt_key_2026
      - key: STREAMLIT_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: sentinel-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.headless true --server.address 0.0.0.0
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        value: sentinel_secret_jwt_key_2026
      - key: API_BASE
        sync: false
